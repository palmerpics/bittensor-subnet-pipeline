name: hourly-ingest

# Intraday pool snapshots (price / root_prop / reserves only).
# Disabled by default — uncomment the schedule to enable. At ~1 paginated
# call/hour this stays well inside the free Taostats tier alongside the
# daily sweep, but mind GitHub Actions minutes if the repo is private.

on:
  # schedule:
  #   - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ vars.R2_BUCKET || 'bittensor-lake' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m ingest.run_ingest --cadence hourly
